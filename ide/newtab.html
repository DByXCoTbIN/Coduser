<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .search-box {
            width: 100%;
            padding: 16px 24px;
            font-size: 16px;
            border: none;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box:focus {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .shortcuts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            max-width: 600px;
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
        }

        .shortcut:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-4px);
        }

        .shortcut-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .shortcut-title {
            font-size: 12px;
            text-align: center;
            opacity: 0.8;
        }

        .time {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 14px;
            opacity: 0.6;
        }

        .weather {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 14px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="time" id="time"></div>
    <div class="weather">🌤 22°C</div>

    <div class="search-container">
        <input type="text" class="search-box" placeholder="Search or enter URL" id="searchBox">
    </div>

    <div class="shortcuts">
        <a href="https://google.com" class="shortcut">
            <div class="shortcut-icon">🔍</div>
            <div class="shortcut-title">Google</div>
        </a>
        <a href="https://youtube.com" class="shortcut">
            <div class="shortcut-icon">📺</div>
            <div class="shortcut-title">YouTube</div>
        </a>
        <a href="https://github.com" class="shortcut">
            <div class="shortcut-icon">💻</div>
            <div class="shortcut-title">GitHub</div>
        </a>
        <a href="https://stackoverflow.com" class="shortcut">
            <div class="shortcut-icon">📚</div>
            <div class="shortcut-title">Stack Overflow</div>
        </a>
    </div>

    <script>
        // Update time
        function updateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            document.getElementById('time').textContent = now.toLocaleDateString('ru-RU', options);
        }
        
        updateTime();
        setInterval(updateTime, 60000);

        // Handle search
        document.getElementById('searchBox').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query) {
                    if (query.includes('.') && !query.includes(' ')) {
                        window.location.href = query.startsWith('http') ? query : `http://${query}`;
                    } else {
                        window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                    }
                }
            }
        });

        // Focus search on load
        document.getElementById('searchBox').focus();
    </script>
</body>
</html>
